<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hello World</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f6f7fb;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 0 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button {
            background: linear-gradient(90deg, #4e54c8, #8f94fb);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 28px;
            font-size: 1.1em;
            margin: 8px 4px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(78,84,200,0.12);
            transition: transform 0.15s, box-shadow 0.15s, background 0.3s;
            outline: none;
        }
        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(78,84,200,0.18);
            background: linear-gradient(90deg, #8f94fb, #4e54c8);
        }
        button:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(78,84,200,0.10);
        }
        input[type="number"], input[type="text"] {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #bfc0c0;
            font-size: 1em;
            margin-right: 8px;
            outline: none;
            transition: border 0.2s;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            border: 1.5px solid #4e54c8;
        }
        p {
            font-size: 1.2em;
            color: #333;
        }
        #result {
            margin-top: 24px;
            font-size: 1.5em;
            color: #4e54c8;
            min-height: 2em;
            transition: color 0.3s, transform 0.2s;
        }
        #result.correct {
            color: #2ecc40;
            animation: pop 0.4s;
        }
        #result.wrong {
            color: #e74c3c;
            animation: shake 0.4s;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            60% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <h1 id="greeting">Hello, World!</h1>
    <div style="margin-bottom: 1em;">
        <button id="btnLogic">Logické hodnoty</button>
        <button id="btnStringCompare">Porovnanie riadkov</button>
        <button id="btnPrompt">Prompt</button>
        <button id="btnConfirm">Confirm</button>
        <button id="btnIf">Podmienka if/else</button>
    <button id="btnWhile">Cyklus while</button>
    <button id="btnFor">Cyklus for</button>
    <button id="btnFuncBasic">Funkcia: základ</button>
    <button id="btnFuncParam">Funkcia: s parametrom</button>
    <button id="btnFuncReturn">Funkcia: návratová hodnota</button>
    </div>
    <button id="toggle">Toggle Greeting</button>
    <button id="Change">Change background</button>
    <input type="text" id="nameInput" placeholder="Enter your name" />
    <button id="greetUser">Greet User</button>
    <div id="message"></div>
    <br>
    <button id="clearMessage">Clear Message</button>
    <button id="resetCounter">Reset Counter</button>
    <div id="counter">0</div>

    <p>Guess the number 1-10</p>
    <input type="number" id="guess" placeholder="enter number">
    <button id="submitGuess">SUBMIT</button>
    <h1 id="result"></h1>

    <script>
    document.getElementById('btnWhile').onclick = function() {
        var i = 0;
        var result = '';
        while (i < 3) {
            result += i + ' ';
            i++;
        }
        alert('Výsledok while: ' + result.trim());
    };
    document.getElementById('btnFor').onclick = function() {
        var result = '';
        for (var i = 0; i < 3; i++) {
            result += i + ' ';
        }
        alert('Výsledok for: ' + result.trim());
    };
    document.getElementById('btnFuncBasic').onclick = function() {
        function showMessage() {
            alert('Ahojte priatelia!');
        }
        showMessage();
    };
    document.getElementById('btnFuncParam').onclick = function() {
        function showMessage(from, text) {
            from = '**' + from + '**';
            alert(from + ': ' + text);
        }
        showMessage('Eva', 'Ahoj!');
        showMessage('Eva', 'Ako sa máš?');
    };
    document.getElementById('btnFuncReturn').onclick = function() {
        function sum(a, b) {
            return a + b;
        }
        var test = sum(2, 5);
        alert('sum(2, 5) = ' + test);
    };
        
        
        document.getElementById('btnLogic').onclick = function() {
            alert('2 > 1: ' + (2 > 1)); 
            alert('2 == 1: ' + (2 == 1)); 
            alert('2 != 1: ' + (2 != 1)); 
            let a = true;
            let b = 3 > 4;
            alert('b = 3 > 4: ' + b); 
            alert('a == b: ' + (a == b)); 
        };
        document.getElementById('btnStringCompare').onclick = function() {
            alert("'B' > 'A': " + ('B' > 'A'));
        };
        document.getElementById('btnPrompt').onclick = function() {
            let years = prompt('Koľko máte rokov?', 100);
            alert('Máte ' + years + ' rokov!');
        };
        document.getElementById('btnConfirm').onclick = function() {
            let isAdmin = confirm('Ste administrátor?');
            alert(isAdmin);
        };
        document.getElementById('btnIf').onclick = function() {
            let year = prompt('V akom roku vznikla akadémia ITSTEP?', '');
            if (year != 2011) {
                alert('A je to..');
                alert('..nesprávne!');
            } else {
                alert('Si dobrý!');
            }
        };
        const greeting = document.getElementById('greeting');
        const btn = document.getElementById('toggle');
        const changeBgBtn = document.getElementById('Change');
        const nameInput = document.getElementById('nameInput');
        const greetUserBtn = document.getElementById('greetUser');
        const message = document.getElementById("message");
        const clearMessage = document.getElementById("clearMessage");
        const counter = document.getElementById("counter");
        const resetCounter = document.getElementById("resetCounter");
        let clickCount = 0;
        const input = prompt("Please enter your name:");
        const alertt = confirm("Do you want to proceed?");
        let x = 1;
        x = -x;
        alert(x);
        alert ( 15 % 2 )

        if (alertt == true) {
            alert("Hello, " + input + "! Welcome to my website!");
        } else {
            alert("Goodbye!");
            window.location.href = "https://www.google.com";
        }
        btn.addEventListener('click', () => {
            greeting.textContent = greeting.textContent === 'Hello, World!'
                ? 'Hello from JavaScript!'
                : 'Hello, World!';
            clickCount += 1;
            counter.textContent = "Pocet kliknuti: " + clickCount;
        });

        changeBgBtn.addEventListener('click', () => {
            
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            document.body.style.backgroundColor = randomColor;
        });

        greetUserBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            message.textContent = name ? `Hello, ${name}!` : 'Hello, World!';
            
        });
        clearMessage.addEventListener("click", () => {
            message.textContent = '';
        });
        resetCounter.addEventListener("click", () => {
            counter.textContent = '0';
            clickCount = 0;
        });

        let randomNumber = Math.floor(Math.random() * 10) + 1;

        document.getElementById('submitGuess').onclick = function() {
            let userGuess = Number(document.getElementById("guess").value);
            let result = document.getElementById("result");
                result.classList.remove('correct', 'wrong');
                // Force reflow to restart animation
                void result.offsetWidth;
                if (userGuess === randomNumber) {
                    result.textContent = "Correct! You guessed it!";
                    result.classList.add('correct');
                } else {
                    result.textContent = "Wrong! Try again.";
                    result.classList.add('wrong');
                    result.classList.add('wrong');
                }
        }
        // Also log to the console
        console.log('Page loaded: Hello, World!');
    </script>
</body>
</html>
